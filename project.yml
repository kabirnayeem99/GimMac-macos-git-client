name: GimMac
options:
  bundleIdPrefix: io.github.kabirnayeem99
  deploymentTarget:
    macOS: "14.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.1"
    GENERATE_INFOPLIST_FILE: YES
    DEAD_CODE_STRIPPING: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 8B32JSRHMA
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
    CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: YES
    CLANG_WARN_OBJC_LITERAL_CONVERSION: YES
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
    CLANG_WARN_STRICT_PROTOTYPES: YES
    CLANG_WARN_COMMA: YES
    CLANG_WARN_UNGUARDED_AVAILABILITY: YES
    CLANG_WARN_SUSPICIOUS_MOVE: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    SWIFT_STRICT_CONCURRENCY: complete
    OTHER_SWIFT_FLAGS: "$(inherited) -warnings-as-errors"
targets:
  GimMac:
    type: application
    platform: macOS
    sources:
      - path: Sources/GimMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.kabirnayeem99.gimmac
        PRODUCT_NAME: GimMac
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: GimMac
        INFOPLIST_KEY_LSUIElement: NO
        INFOPLIST_KEY_LSBackgroundOnly: NO
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026"
    scheme:
      testTargets:
        - name: GimMacTests
          parallelizable: false
        - name: GimMacIntegrationTests
          parallelizable: false
        - name: GimMacUITests
          parallelizable: false

  GimMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/GimMacTests
    dependencies:
      - target: GimMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.kabirnayeem99.gimmac.tests
        GENERATE_INFOPLIST_FILE: YES

  GimMacIntegrationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/GimMacIntegrationTests
    dependencies:
      - target: GimMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.kabirnayeem99.gimmac.integrationtests
        GENERATE_INFOPLIST_FILE: YES

  GimMacUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: UITests/GimMacUITests
    dependencies:
      - target: GimMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.kabirnayeem99.gimmac.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: GimMac
