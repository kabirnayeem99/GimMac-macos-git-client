included:
  - Sources
  - App
  - Tests

excluded:
  - .build
  - DerivedData
  - build
  - vendor

strict: true

analyzer_rules:
  - unused_declaration
  - unused_import

opt_in_rules:
  - anyobject_protocol
  - array_init
  - closure_body_length
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - comma_inheritance
  - convenience_type
  - discouraged_object_literal
  - discouraged_optional_boolean
  - discouraged_optional_collection
  - empty_count
  - empty_string
  - explicit_init
  - explicit_self
  - fallthrough
  - file_header
  - first_where
  - force_unwrapping
  - function_default_parameter_at_end
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_random
  - let_var_whitespace
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - nimble_operator
  - no_extension_access_modifier
  - operator_usage_whitespace
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - required_enum_case
  - sorted_first_last
  - strict_fileprivate
  - switch_case_alignment
  - toggle_bool
  - trailing_closure
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - yoda_condition

disabled_rules:
  - todo

force_cast: error
force_try: error
line_length:
  warning: 110
  error: 130
type_body_length:
  warning: 250
  error: 350
function_body_length:
  warning: 45
  error: 70
cyclomatic_complexity:
  warning: 8
  error: 12
nesting:
  type_level:
    warning: 1
    error: 2
file_length:
  warning: 500
  error: 700

file_header:
  required_pattern: |
    \/\/
    \/\/  .*$
    \/\/  Gim$
    \/\/
